<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>¡ACTION! - Filmmaker Platformer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: #0f0f23;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.3);
        }
        @media (max-width: 768px) {
            #gameContainer {
                max-width: 100%;
                aspect-ratio: 9/16;
                height: 100vh;
                border-radius: 0;
            }
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            z-index: 10;
        }
        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 14px;
            font-weight: bold;
        }
        #hud .score { color: #ffd700; }
        #hud .level { color: #e94560; }
        .progress-container {
            width: 150px;
            height: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ffd700);
            transition: width 0.3s;
            border-radius: 6px;
        }
        .battery-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .battery-bar {
            width: 50px;
            height: 14px;
            border: 2px solid #fff;
            border-radius: 4px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
        }
        .battery-fill {
            height: 100%;
            background: #4ecca3;
            transition: width 0.3s;
        }
        .battery-fill.low { background: #e94560; }
        .battery-fill.critical { background: #ff0000; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            pointer-events: auto;
            display: none;
            z-index: 20;
        }
        #message button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #message a {
            color: #ffd700;
            text-decoration: underline;
            font-size: 16px;
            display: block;
            margin-top: 10px;
        }
        #controls {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
            padding: 0 10px 10px;
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            z-index: 15;
        }
        .control-btn {
            width: 85px; height: 85px;
            border-radius: 50%;
            background: rgba(233, 69, 96, 0.3);
            border: 3px solid rgba(255,255,255,0.6);
            color: #fff;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            touch-action: none;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.3);
        }
        .control-btn:active { background: rgba(233, 69, 96, 0.7); transform: scale(0.95); }
        .control-group { display: flex; gap: 15px; }
        @media (max-width: 768px) {
            .control-btn { width: 75px; height: 75px; font-size: 28px; }
            .control-group { gap: 12px; }
        }
        @media (max-width: 400px) {
            .control-btn { width: 65px; height: 65px; font-size: 24px; }
            .control-group { gap: 8px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="hud">
                <div class="score">🎬 <span id="scoreValue">0</span></div>
                <div class="level">📍 <span id="levelValue">1</span>/3</div>
                <div class="progress-container">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="battery-container">
                    🔋<div class="battery-bar"><div class="battery-fill" id="batteryFill" style="width: 100%"></div></div>
                </div>
            </div>
            <div id="message">
                <div id="messageTitle">¡ACTION!</div>
                <div id="messageSubtitle">El juego del filmmaker</div>
                <div id="messageExtra"></div>
                <button id="messageBtn" onclick="startGame()">¡Rodar!</button>
            </div>
        </div>
        <div id="controls">
            <div class="control-group">
                <div class="control-btn" id="btnLeft">←</div>
                <div class="control-btn" id="btnRight">→</div>
            </div>
            <div class="control-group">
                <div class="control-btn" id="btnJump">↑</div>
                <div class="control-btn" id="btnShoot">📷</div>
            </div>
        </div>
    </div>

<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    switch(type) {
        case 'jump':
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1);
            break;
        case 'collect':
            osc.frequency.setValueAtTime(523, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.3);
            break;
        case 'hurt':
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.type = 'sawtooth';
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.2);
            break;
        case 'step':
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.05);
            break;
        case 'shoot':
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.type = 'square';
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.15);
            break;
        case 'hit':
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.type = 'square';
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1);
            break;
        case 'victory':
            const notes = [523, 659, 784, 1047, 784, 1047, 1319];
            notes.forEach((freq, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g);
                g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.18);
                g.gain.setValueAtTime(0.3, audioCtx.currentTime + i * 0.18);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.18 + 0.35);
                o.start(audioCtx.currentTime + i * 0.18);
                o.stop(audioCtx.currentTime + i * 0.18 + 0.35);
            });
            break;
    }
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resize() {
    const container = document.getElementById('gameContainer');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
}
resize();
window.addEventListener('resize', resize);

let gameRunning = false;
let score = 0;
let level = 1;
let battery = 100;
let camera = { x: 0 };
let frameCount = 0;
let particles = [];
let floatingTexts = [];
let stepTimer = 0;
let projectiles = [];
let victoryState = null;
let powerups = [];
let activePowerup = null;
let powerupTimer = 0;
let controlInverted = false;
let flashBombs = [];

const GRAVITY = 0.6;
const JUMP_FORCE = -12;
const MOVE_SPEED = 5;
const WORLD_WIDTH = 6000;

const player = {
    x: 100, y: 300, width: 32, height: 40,
    vx: 0, vy: 0, onGround: false, facing: 1,
    animFrame: 0, animTimer: 0, invincible: 0,
    state: 'idle', shootCooldown: 0
};

const keys = {};
document.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

function setupBtn(id, key) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; initAudio(); });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('mousedown', () => { keys[key] = true; initAudio(); });
    btn.addEventListener('mouseup', () => keys[key] = false);
}
setupBtn('btnLeft', 'arrowleft');
setupBtn('btnRight', 'arrowright');
setupBtn('btnJump', ' ');
setupBtn('btnShoot', 'z');

// ===== SPRITES =====
function drawSpriteCamera(x, y, size) {
    ctx.fillStyle = '#2c2c2c';
    ctx.fillRect(x - size/2, y - size/3, size, size/1.5);
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(x, y, size/3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0d47a1';
    ctx.beginPath(); ctx.arc(x, y, size/4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(x - size/4, y - size/2, size/2, size/6);
}
function drawSpriteLens(x, y, size) {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x - size/3, y - size/2, size/1.5, size);
    ctx.fillStyle = '#0d47a1';
    ctx.beginPath(); ctx.arc(x, y, size/3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.arc(x - size/8, y - size/8, size/8, 0, Math.PI * 2); ctx.fill();
}
function drawSpriteBattery(x, y, size) {
    ctx.fillStyle = '#4caf50';
    ctx.fillRect(x - size/3, y - size/2, size/1.5, size);
    ctx.fillStyle = '#2e7d32';
    ctx.fillRect(x - size/6, y - size/2 - size/8, size/3, size/8);
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath();
    ctx.moveTo(x + size/8, y - size/4);
    ctx.lineTo(x - size/8, y);
    ctx.lineTo(x + size/8, y);
    ctx.lineTo(x - size/8, y + size/4);
    ctx.fill();
}
function drawSpriteCoffee(x, y, size) {
    ctx.fillStyle = '#795548';
    ctx.fillRect(x - size/3, y - size/3, size/1.5, size/1.5);
    ctx.strokeStyle = '#795548'; ctx.lineWidth = size/8;
    ctx.beginPath(); ctx.arc(x + size/3, y, size/4, -Math.PI/2, Math.PI/2); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2;
    for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(x + i * size/4, y - size/2);
        ctx.quadraticCurveTo(x + i * size/4 + size/8, y - size, x + i * size/4, y - size * 1.2);
        ctx.stroke();
    }
}
function drawSpriteClapper(x, y, size) {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x - size/2, y, size, size/4);
    ctx.save();
    ctx.translate(x, y); ctx.rotate(-0.3);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-size/2, -size/4, size, size/4);
    ctx.fillStyle = '#e94560';
    for (let i = 0; i < 4; i++) ctx.fillRect(-size/2 + i * size/4, -size/4, size/8, size/4);
    ctx.restore();
}
function drawSpriteDrone(x, y, size) {
    ctx.fillStyle = '#424242';
    ctx.beginPath(); ctx.ellipse(x, y, size/3, size/4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#757575';
    for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 2) {
        const px = x + Math.cos(angle) * size/2;
        const py = y + Math.sin(angle) * size/3;
        ctx.beginPath(); ctx.arc(px, py, size/6, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(px, py, size/4, frameCount * 0.5 + angle, frameCount * 0.5 + angle + Math.PI); ctx.stroke();
    }
}

// ===== NEW ENEMY SPRITES =====
function drawSpriteEnemyGuionista(x, y, size, facing, animFrame) {
    ctx.save(); ctx.translate(x, y);
    if (facing < 0) ctx.scale(-1, 1);
    const legSwing = Math.sin(animFrame * 0.3) * 3;
    // Body - writer with pages
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(-size/2.5, -size/3, size/1.25, size/1.5);
    // Head
    ctx.fillStyle = '#fdbcb4';
    ctx.beginPath(); ctx.arc(0, -size/2, size/3, 0, Math.PI * 2); ctx.fill();
    // Glasses
    ctx.fillStyle = '#333';
    ctx.fillRect(-size/4, -size/2 - size/12, size/5, size/10);
    ctx.fillRect(size/20, -size/2 - size/12, size/5, size/10);
    // Pages floating
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 3; i++) {
        const px = Math.cos(animFrame * 0.1 + i * 2) * size * 0.6;
        const py = Math.sin(animFrame * 0.1 + i * 2) * size/3 - size/2;
        ctx.fillRect(px - size/6, py - size/8, size/3, size/4);
        ctx.strokeStyle = '#333'; ctx.lineWidth = 0.5;
        ctx.strokeRect(px - size/6, py - size/8, size/3, size/4);
        ctx.fillStyle = '#333'; ctx.font = '5px Arial';
        ctx.fillText('ACT', px - size/10, py);
        ctx.fillStyle = '#fff';
    }
    // Legs
    ctx.fillStyle = '#3e2723';
    ctx.fillRect(-size/3, size/3, size/3, size/2 + legSwing);
    ctx.fillRect(2, size/3, size/3, size/2 - legSwing);
    ctx.restore();
}

function drawSpriteEnemyActorDivo(x, y, size, facing, animFrame) {
    ctx.save(); ctx.translate(x, y);
    if (facing < 0) ctx.scale(-1, 1);
    const bounce = Math.abs(Math.sin(animFrame * 0.5)) * 5;
    // Body - fancy actor
    ctx.fillStyle = '#e91e63';
    ctx.fillRect(-size/2, -size/3 - bounce, size, size/1.5);
    // Star on chest
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        const angle = (i * 4 * Math.PI / 5) - Math.PI/2;
        const r = i % 2 === 0 ? size/4 : size/8;
        const px = Math.cos(angle) * r;
        const py = -bounce + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
    // Head
    ctx.fillStyle = '#ffcc80';
    ctx.beginPath(); ctx.arc(0, -size/2 - bounce, size/3, 0, Math.PI * 2); ctx.fill();
    // Sunglasses
    ctx.fillStyle = '#000';
    ctx.fillRect(-size/3, -size/2 - size/10 - bounce, size/1.5, size/10);
    // Legs (dancing)
    const legDance = Math.sin(animFrame * 0.8) * 8;
    ctx.fillStyle = '#880e4f';
    ctx.fillRect(-size/3, size/3 - bounce, size/3, size/2 + legDance);
    ctx.fillRect(2, size/3 - bounce, size/3, size/2 - legDance);
    ctx.restore();
}

function drawSpriteEnemyPresupuesto(x, y, size, facing, animFrame) {
    ctx.save(); ctx.translate(x, y);
    if (facing < 0) ctx.scale(-1, 1);
    // Empty wallet/bag
    ctx.fillStyle = '#795548';
    ctx.beginPath(); ctx.arc(0, 0, size/2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#5d4037';
    ctx.beginPath(); ctx.arc(0, 0, size/3, 0, Math.PI * 2); ctx.fill();
    // Empty sign
    ctx.fillStyle = '#fff';
    ctx.fillRect(-size/3, -size/2, size/1.5, size/3);
    ctx.fillStyle = '#e94560';
    ctx.font = `bold ${size/2.5}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('0€', 0, -size/3);
    // Moths flying out
    for (let i = 0; i < 2; i++) {
        const mx = Math.cos(animFrame * 0.2 + i * 3) * size * 0.8;
        const my = Math.sin(animFrame * 0.3 + i * 3) * size/2 - size/2;
        ctx.fillStyle = '#ccc';
        ctx.beginPath();
        ctx.ellipse(mx, my, 3, 2, animFrame * 0.5, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

function drawSpriteEnemyDeadline(x, y, size, facing, animFrame, timer) {
    ctx.save(); ctx.translate(x, y);
    if (facing < 0) ctx.scale(-1, 1);
    const pulse = Math.sin(animFrame * 0.2) * 0.1 + 1;
    ctx.scale(pulse, pulse);
    // Bomb body
    ctx.fillStyle = timer < 180 ? '#f44336' : '#ff9800';
    ctx.beginPath(); ctx.arc(0, 0, size/2.5, 0, Math.PI * 2); ctx.fill();
    // Fuse
    ctx.strokeStyle = '#795548'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, -size/2.5); ctx.lineTo(5, -size/1.5); ctx.stroke();
    // Spark
    if (timer < 180) {
        ctx.fillStyle = '#ffeb3b';
        ctx.beginPath(); ctx.arc(5, -size/1.5, 3 + Math.sin(animFrame * 0.5) * 2, 0, Math.PI * 2); ctx.fill();
    }
    // Clock face
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, 0, size/4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -size/5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(size/6, 0); ctx.stroke();
    ctx.restore();
}

function drawSpriteEnemyInfluencer(x, y, size, facing, animFrame) {
    ctx.save(); ctx.translate(x, y);
    if (facing < 0) ctx.scale(-1, 1);
    // Phone body
    ctx.fillStyle = '#212121';
    ctx.fillRect(-size/3, -size/2, size/1.5, size);
    // Screen
    ctx.fillStyle = '#e91e63';
    ctx.fillRect(-size/4, -size/3, size/2, size/1.5);
    // Selfie icon
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, -size/6, size/6, 0, Math.PI * 2); ctx.fill();
    // Hearts floating
    for (let i = 0; i < 3; i++) {
        const hx = Math.cos(animFrame * 0.15 + i * 2) * size * 0.8;
        const hy = Math.sin(animFrame * 0.2 + i * 2) * size/2 - size;
        ctx.fillStyle = '#e91e63';
        ctx.font = `${size/2}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText('♥', hx, hy);
    }
    // Tripod legs
    ctx.strokeStyle = '#757575'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-size/3, size/2); ctx.lineTo(-size/2, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(size/3, size/2); ctx.lineTo(size/2, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, size/2); ctx.lineTo(0, size); ctx.stroke();
    ctx.restore();
}

function drawSpriteEnemyMarketing(x, y, size, facing, animFrame, text) {
    ctx.save(); ctx.translate(x, y);
    if (facing < 0) ctx.scale(-1, 1);
    // Suit
    ctx.fillStyle = '#1565c0';
    ctx.fillRect(-size/2.5, -size/3, size/1.25, size/1.5);
    // Tie
    ctx.fillStyle = '#c62828';
    ctx.beginPath(); ctx.moveTo(0, -size/3); ctx.lineTo(-size/8, size/3); ctx.lineTo(size/8, size/3); ctx.fill();
    // Head
    ctx.fillStyle = '#fdbcb4';
    ctx.beginPath(); ctx.arc(0, -size/2, size/3, 0, Math.PI * 2); ctx.fill();
    // Smile
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, -size/3, size/6, 0, Math.PI); ctx.stroke();
    // Chart/graph floating
    const chartY = Math.sin(animFrame * 0.1) * 5 - size;
    ctx.fillStyle = 'rgba(255,152,0,0.8)';
    ctx.fillRect(size/2, chartY, size/2, size/3);
    ctx.fillStyle = '#fff';
    ctx.fillRect(size/2 + 2, chartY + 2, size/2 - 4, size/3 - 4);
    // Bar chart lines
    ctx.fillStyle = '#ff9800';
    ctx.fillRect(size/2 + 4, chartY + size/6, 4, size/6 - 2);
    ctx.fillRect(size/2 + 10, chartY + size/8, 4, size/4 - 2);
    ctx.fillRect(size/2 + 16, chartY + size/4, 4, size/8 - 2);
    ctx.restore();
}

// ===== ENEMIES =====
function drawSpriteEnemyClientePesado(x, y, size, facing, animFrame) {
    ctx.save(); ctx.translate(x, y);
    if (facing < 0) ctx.scale(-1, 1);
    const legSwing = Math.sin(animFrame * 0.3) * 4;
    // Legs
    ctx.fillStyle = '#0d47a1';
    ctx.fillRect(-size/3, size/3, size/3, size/2 + legSwing);
    ctx.fillRect(2, size/3, size/3, size/2 - legSwing);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-size/3 - 2, size/3 + size/2 + legSwing, size/2.5, 5);
    ctx.fillRect(2, size/3 + size/2 - legSwing, size/2.5, 5);
    // Body
    ctx.fillStyle = '#1565c0';
    ctx.fillRect(-size/2, -size/3, size, size/1.5);
    ctx.fillStyle = '#d32f2f';
    ctx.fillRect(-2, -size/3, 4, size/2);
    // Head
    ctx.fillStyle = '#fdbcb4';
    ctx.beginPath(); ctx.arc(0, -size/2, size/3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.fillRect(-size/4, -size/2 - size/10, size/6, size/10);
    ctx.fillRect(size/12, -size/2 - size/10, size/6, size/10);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-size/6, -size/3); ctx.lineTo(size/6, -size/3); ctx.stroke();
    // Briefcase
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(size/3, -size/6, size/2.5, size/2.5);
    ctx.fillStyle = '#8d6e63';
    ctx.fillRect(size/3 + 2, size/6, size/2.5 - 4, 2);
    ctx.restore();
}

function drawSpriteEnemyCambioInesperado(x, y, size, facing, animFrame) {
    ctx.save(); ctx.translate(x, y);
    if (facing < 0) ctx.scale(-1, 1);
    const legSwing = Math.sin(animFrame * 0.5) * 6;
    // Legs
    ctx.fillStyle = '#4a148c';
    ctx.fillRect(-size/3, size/2.5, size/4, size/3 + legSwing);
    ctx.fillRect(2, size/2.5, size/4, size/3 - legSwing);
    // Body
    ctx.fillStyle = '#7b1fa2';
    ctx.beginPath(); ctx.arc(0, 0, size/2.5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#4a148c'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, size/3, 0, Math.PI * 2); ctx.stroke();
    // Question marks
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${size/2.5}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('?', -size/2, -size/2 + Math.sin(animFrame * 0.15) * 6);
    ctx.fillText('?', size/3, -size/3 + Math.cos(animFrame * 0.15) * 6);
    ctx.fillText('?', 0, -size * 0.8 + Math.sin(animFrame * 0.2) * 4);
    // Eyes
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    for (let i = -1; i <= 1; i += 2) {
        ctx.beginPath(); ctx.arc(i * size/5, -size/4, size/8, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(i * size/5 + Math.cos(animFrame * 0.2) * 2, -size/4 + Math.sin(animFrame * 0.2) * 2, 2, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
    }
    ctx.restore();
}

function drawSpriteEnemyHacienda(x, y, size, facing, animFrame) {
    ctx.save(); ctx.translate(x, y);
    if (facing < 0) ctx.scale(-1, 1);
    const legSwing = Math.sin(animFrame * 0.25) * 3;
    // Legs
    ctx.fillStyle = '#1b5e20';
    ctx.fillRect(-size/3, size/3, size/3, size/2 + legSwing);
    ctx.fillRect(2, size/3, size/3, size/2 - legSwing);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-size/3 - 2, size/3 + size/2 + legSwing, size/2.5, 4);
    ctx.fillRect(2, size/3 + size/2 - legSwing, size/2.5, 4);
    // Body
    ctx.fillStyle = '#2e7d32';
    ctx.fillRect(-size/2, -size/3, size, size/1.5);
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${size/2}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('€', 0, size/8);
    // Head
    ctx.fillStyle = '#fdbcb4';
    ctx.beginPath(); ctx.arc(0, -size/2, size/3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.fillRect(-size/3, -size/2 - size/10, size/3, size/10);
    ctx.fillRect(0, -size/2 - size/10, size/3, size/10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-size/3 + 2, -size/2 - size/10 + 1, size/3 - 4, size/10 - 2);
    ctx.fillRect(2, -size/2 - size/10 + 1, size/3 - 4, size/10 - 2);
    // Forms
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 2; i++) {
        const px = Math.cos(animFrame * 0.05 + i * 3) * size * 0.8;
        const py = Math.sin(animFrame * 0.05 + i * 3) * size/2 - size/2;
        ctx.fillRect(px - size/8, py - size/8, size/3, size/4);
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
        ctx.strokeRect(px - size/8, py - size/8, size/3, size/4);
        ctx.fillStyle = '#333'; ctx.font = '6px Arial';
        ctx.fillText('IVA', px - size/12, py);
        ctx.fillStyle = '#fff';
    }
    ctx.restore();
}

function drawSpriteEnemyProductor(x, y, size, health, animFrame) {
    const pulse = Math.sin(animFrame * 0.05) * 0.05 + 1;
    ctx.save(); ctx.translate(x, y); ctx.scale(pulse, pulse);
    // Body
    ctx.fillStyle = '#b71c1c';
    ctx.fillRect(-size, -size/2, size * 2, size);
    ctx.fillStyle = '#7f0000';
    ctx.fillRect(-size + 5, -size/2 + 5, size * 2 - 10, size - 10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-size/4, -size/2, size/2, size/3);
    // Head
    ctx.fillStyle = '#fdbcb4';
    ctx.beginPath(); ctx.arc(0, -size * 0.65, size/1.8, 0, Math.PI * 2); ctx.fill();
    // Sunglasses
    ctx.fillStyle = '#000';
    ctx.fillRect(-size/2.5, -size * 0.75, size/1.25, size/5);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(-size/3, -size * 0.73, size/6, size/10);
    ctx.fillRect(size/8, -size * 0.73, size/6, size/10);
    // Cigar
    ctx.fillStyle = '#8d6e63';
    ctx.fillRect(size/3, -size/3, size/1.5, size/8);
    ctx.fillStyle = '#ff5722';
    ctx.beginPath(); ctx.arc(size * 0.9, -size/3 + size/16, size/10, 0, Math.PI * 2); ctx.fill();
    // Smoke
    ctx.fillStyle = 'rgba(200,200,200,0.4)';
    for (let i = 0; i < 3; i++) {
        const sx = size * 0.9 + Math.cos(animFrame * 0.03 + i) * 10;
        const sy = -size/2 - i * 15 + Math.sin(animFrame * 0.05 + i) * 5;
        ctx.beginPath(); ctx.arc(sx, sy, 4 + i * 2, 0, Math.PI * 2); ctx.fill();
    }
    // Health bar
    ctx.fillStyle = '#333';
    ctx.fillRect(-size, -size * 1.3, size * 2, size/5);
    ctx.fillStyle = health > 50 ? '#4caf50' : health > 25 ? '#ff9800' : '#f44336';
    ctx.fillRect(-size + 2, -size * 1.3 + 2, (size * 2 - 4) * (health / 100), size/5 - 4);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${size/4}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('PRODUCTOR', 0, -size * 1.15);
    ctx.restore();
}

    const textWidth = ctx.measureText(name).width;
    const padding = 6;
    const boxWidth = textWidth + padding * 2;
    const boxHeight = 18;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(x - boxWidth/2, y - boxHeight - 2, boxWidth, boxHeight);
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1;
    ctx.strokeRect(x - boxWidth/2, y - boxHeight - 2, boxWidth, boxHeight);
    ctx.fillStyle = '#ffd700';
    ctx.textAlign = 'center';
    ctx.fillText(name, x, y - 6);
}

let currentLevel = null;
let platforms = [];
let collectibles = [];
let enemies = [];
let boss = null;

function loadLevel(lvl) {
    const data = levels[lvl - 1];
    currentLevel = data;
    platforms = [...data.platforms];
    collectibles = data.collectibles.map(c => ({ ...c, collected: false, floatY: 0 }));
    powerups = (data.powerups || []).map(p => ({ ...p, collected: false, floatY: 0 }));
    enemies = data.enemies.map(e => ({
        ...e,
        vx: e.speed,
        vy: 0,
        startX: e.x,
        currentHealth: e.health,
        onGround: false,
        animFrame: 0,
        animTimer: 0,
        direction: 1,
        scriptProjectiles: [],
        deadlineTimer: e.type === 'deadline' ? 300 : 0,
        marketingText: '',
        marketingTimer: 0
    }));
    if (data.boss) {
        boss = {
            ...data.boss,
            currentHealth: data.boss.health,
            vx: 2, vy: 0,
            startX: data.boss.x,
            onGround: false,
            direction: 1
        };
    } else {
        boss = null;
    }
    player.x = 100; player.y = 300;
    player.vx = 0; player.vy = 0;
    player.invincible = 0;
    player.state = 'idle';
    activePowerup = null;
    powerupTimer = 0;
    controlInverted = false;
    flashBombs = [];
    projectiles = [];
    camera.x = 0;
    victoryState = null;
}

function startGame() {
    initAudio();
    gameRunning = true;
    score = 0; level = 1; battery = 100;
    particles = []; floatingTexts = []; projectiles = [];
    powerups = []; activePowerup = null; powerupTimer = 0;
    controlInverted = false; flashBombs = [];
    loadLevel(1);
    document.getElementById('message').style.display = 'none';
    updateHUD();
    gameLoop();
}

function showMessage(title, subtitle, btnText, action, extraHTML) {
    gameRunning = false;
    document.getElementById('messageTitle').textContent = title;
    document.getElementById('messageSubtitle').textContent = subtitle;
    document.getElementById('messageBtn').textContent = btnText;
    document.getElementById('messageBtn').onclick = action;
    document.getElementById('messageExtra').innerHTML = extraHTML || '';
    document.getElementById('message').style.display = 'block';
}

function createParticles(x, y, color, count) {
    for (let i = 0; i < (count || 8); i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 30,
            color,
            size: Math.random() * 4 + 2
        });
    }
}

function createFloatingText(x, y, text, color) {
    floatingTexts.push({ x, y, text, color, life: 60, vy: -2 });
}

function applyGravity(entity) { entity.vy += GRAVITY; }

function checkPlatformCollision(entity) {
    entity.onGround = false;
    for (const plat of platforms) {
        if (plat.type === 'block' || plat.type === 'pipe') continue;
        if (entity.x + entity.width > plat.x &&
            entity.x < plat.x + plat.w &&
            entity.y + entity.height >= plat.y &&
            entity.y + entity.height <= plat.y + plat.h + entity.vy + 5 &&
            entity.vy >= 0) {
            entity.y = plat.y - entity.height;
            entity.vy = 0;
            entity.onGround = true;
            return plat;
        }
    }
    return null;
}

function update() {
    if (!gameRunning) return;
    frameCount++;

    if (victoryState) {
        victoryState.timer++;
        // Player jumping happily
        if (player.onGround) {
            player.vy = JUMP_FORCE;
            player.onGround = false;
            playSound('jump');
            createParticles(player.x + 16, player.y + 40, '#ffd700', 5);
        }
        applyGravity(player);
        player.y += player.vy;
        checkPlatformCollision(player);
        // Camera rises up
        victoryState.cameraY = Math.min(victoryState.cameraY + 2, 200);
        // Confetti
        if (victoryState.timer % 5 === 0) {
            const colors = ['#ffd700', '#e94560', '#4ecca3', '#ff5722', '#2196f3'];
            createParticles(
                Math.random() * canvas.width + camera.x,
                camera.y - 50,
                colors[Math.floor(Math.random() * colors.length)],
                3
            );
        }
        if (victoryState.timer > 300) {
            // Show victory message after celebration
            showVictoryScreen();
            return;
        }
        updateHUD();
        return;
    }

    const left = keys['arrowleft'] || keys['a'];
    const right = keys['arrowright'] || keys['d'];
    const jump = keys[' '] || keys['arrowup'] || keys['w'];
    const shoot = keys['z'] || keys['x'] || keys['c'];

    const moveLeft = controlInverted ? right : left;
    const moveRight = controlInverted ? left : right;

    if (shoot && player.shootCooldown <= 0) {
        player.shootCooldown = activePowerup === 'powerup4K' ? 10 : 20;
        const speedMult = activePowerup === 'powerup4K' ? 1.5 : 1;
        const baseVx = player.facing * 10 * speedMult;
        
        if (activePowerup === 'powerupTriple') {
            // Triple shot
            projectiles.push({
                x: player.x + (player.facing === 1 ? 32 : 0),
                y: player.y + 20,
                vx: baseVx,
                vy: -2,
                life: 60
            });
            projectiles.push({
                x: player.x + (player.facing === 1 ? 32 : 0),
                y: player.y + 20,
                vx: baseVx,
                vy: 0,
                life: 60
            });
            projectiles.push({
                x: player.x + (player.facing === 1 ? 32 : 0),
                y: player.y + 20,
                vx: baseVx,
                vy: 2,
                life: 60
            });
        } else {
            projectiles.push({
                x: player.x + (player.facing === 1 ? 32 : 0),
                y: player.y + 20,
                vx: baseVx,
                vy: 0,
                life: 60
            });
        }
        playSound('shoot');
    }
    if (player.shootCooldown > 0) player.shootCooldown--;

    if (jump && player.onGround) {
        player.vy = activePowerup === 'powerup4K' ? JUMP_FORCE * 1.3 : JUMP_FORCE;
        player.onGround = false;
        player.state = 'jump';
        playSound('jump');
        createParticles(player.x + 16, player.y + 40, '#4ecca3', 5);
    }

    const currentSpeed = (activePowerup === 'powerup4K' ? MOVE_SPEED * 1.5 : MOVE_SPEED);

    if (moveLeft) {
        player.vx = -currentSpeed;
        player.facing = -1;
        if (player.onGround) player.state = 'walk';
    } else if (moveRight) {
        player.vx = currentSpeed;
        player.facing = 1;
        if (player.onGround) player.state = 'walk';
    } else {
        player.vx *= 0.8;
        if (player.onGround && Math.abs(player.vx) < 0.5) player.state = 'idle';
    }

    if (!player.onGround && player.vy < 0) player.state = 'jump';
    if (!player.onGround && player.vy > 0) player.state = 'fall';

    applyGravity(player);
    player.x += player.vx;
    player.y += player.vy;

    player.animTimer++;
    if (player.animTimer > 6) {
        player.animTimer = 0;
        player.animFrame = (player.animFrame + 1) % 4;
    }

    if (player.onGround && Math.abs(player.vx) > 1) {
        stepTimer++;
        if (stepTimer > 15) { stepTimer = 0; playSound('step'); }
    }

    if (player.invincible > 0) player.invincible--;

    // Powerup timer
    if (activePowerup && powerupTimer > 0) {
        powerupTimer--;
        if (powerupTimer <= 0) {
            activePowerup = null;
            controlInverted = false;
            createFloatingText(player.x, player.y - 40, '¡Power-up terminado!', '#aaa');
        }
    }

    // Flash bombs
    flashBombs = flashBombs.filter(b => {
        b.timer--;
        b.x += b.vx;
        b.y += b.vy;
        b.vy += 0.3;
        
        // Explosion
        if (b.timer <= 0) {
            playSound('hit');
            createParticles(b.x, b.y, '#fff', 20);
            createParticles(b.x, b.y, '#ffd700', 15);
            // Damage enemies in radius
            const radius = 120;
            for (const e of enemies) {
                const dx = (e.x + e.w/2) - b.x;
                const dy = (e.y + e.h/2) - b.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < radius) {
                    e.currentHealth -= 3;
                    createFloatingText(e.x, e.y, '¡FLASH!', '#ffd700');
                    if (e.currentHealth <= 0) score += 50;
                }
            }
            if (boss) {
                const dx = boss.x - b.x;
                const dy = boss.y - b.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < radius) {
                    boss.currentHealth -= 3;
                    createFloatingText(boss.x, boss.y - 50, '¡FLASH!', '#ffd700');
                }
            }
            return false;
        }
        
        // Check if bomb hits platform
        for (const plat of platforms) {
            if (b.x > plat.x && b.x < plat.x + plat.w &&
                b.y > plat.y && b.y < plat.y + plat.h) {
                b.timer = 0; // Explode on impact
                return true;
            }
        }
        
        return true;
    });

    const playerPlat = checkPlatformCollision(player);
    if (playerPlat && player.state === 'fall') player.state = 'idle';

    if (player.y > canvas.height + 200) {
        battery -= 20;
        player.x = 100; player.y = 300;
        player.vy = 0; player.state = 'idle';
        createFloatingText(canvas.width/2, canvas.height/2, '¡Caíste! -20% 🔋', '#e94560');
    }

    if (player.x < 0) player.x = 0;
    if (player.x > WORLD_WIDTH - player.width) player.x = WORLD_WIDTH - player.width;

    camera.x = player.x - canvas.width * 0.3;
    if (camera.x < 0) camera.x = 0;
    if (camera.x > WORLD_WIDTH - canvas.width) camera.x = WORLD_WIDTH - canvas.width;

    // Projectiles
    projectiles = projectiles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.life--;
        for (const e of enemies) {
            if (p.x > e.x && p.x < e.x + e.w && p.y > e.y && p.y < e.y + e.h) {
                e.currentHealth--;
                p.life = 0;
                playSound('hit');
                createParticles(e.x + e.w/2, e.y + e.h/2, '#e94560', 5);
                if (e.currentHealth <= 0) {
                    createFloatingText(e.x, e.y, '¡Eliminado!', '#e94560');
                    score += 50;
                }
                return false;
            }
        }
        if (boss && p.x > boss.x - boss.w/2 && p.x < boss.x + boss.w/2 &&
            p.y > boss.y - boss.h/2 && p.y < boss.y + boss.h/2) {
            boss.currentHealth--;
            p.life = 0;
            playSound('hit');
            createParticles(p.x, p.y, '#ff0000', 8);
            if (boss.currentHealth <= 0) {
                createFloatingText(boss.x, boss.y - 50, '¡JEFE DERROTADO!', '#ffd700');
                score += 500;
                boss = null;
                // Trigger victory celebration
                victoryState = { timer: 0, cameraY: camera.y };
                playSound('victory');
            }
            return false;
        }
        return p.life > 0;
    });

    enemies = enemies.filter(e => e.currentHealth > 0);

    // Powerups
    for (const p of powerups) {
        if (!p.collected &&
            player.x < p.x + 30 && player.x + player.width > p.x &&
            player.y < p.y + 30 && player.y + player.height > p.y) {
            p.collected = true;
            activePowerup = p.type;
            powerupTimer = 600; // 10 seconds at 60fps
            playSound('collect');
            createParticles(p.x + 15, p.y + 15, '#ffd700', 15);
            
            if (p.type === 'powerupTriple') {
                createFloatingText(p.x, p.y - 30, '¡DISPARO TRIPLE! 🎥', '#e94560');
            } else if (p.type === 'powerupNuke') {
                createFloatingText(p.x, p.y - 30, '¡BOMBAS DE FLASH! 💣', '#ff5722');
                // Give 3 flash bombs
                flashBombs.push({ x: player.x, y: player.y, vx: player.facing * 5, vy: -8, timer: 60 });
                setTimeout(() => flashBombs.push({ x: player.x, y: player.y, vx: player.facing * 5, vy: -8, timer: 60 }), 200);
                setTimeout(() => flashBombs.push({ x: player.x, y: player.y, vx: player.facing * 5, vy: -8, timer: 60 }), 400);
            } else if (p.type === 'powerup4K') {
                createFloatingText(p.x, p.y - 30, '¡RENDER 4K! ⚡', '#2196f3');
                player.invincible = 600;
            }
        }
        p.floatY = Math.sin(frameCount * 0.05 + p.x) * 5;
    }

    // Collectibles
    for (const c of collectibles) {
        if (!c.collected &&
            player.x < c.x + 30 && player.x + player.width > c.x &&
            player.y < c.y + 30 && player.y + player.height > c.y) {
            c.collected = true;
            score += c.value;
            if (c.type === 'battery') battery = Math.min(100, battery + 25);
            playSound('collect');
            createParticles(c.x + 15, c.y + 15, '#ffd700', 10);
            createFloatingText(c.x, c.y - 20, '+' + c.value, '#ffd700');
        }
        c.floatY = Math.sin(frameCount * 0.05 + c.x) * 5;
    }

    // Enemy physics & AI
    for (const e of enemies) {
        // Special behaviors for new enemies
        if (e.type === 'actorDivo') {
            // Erratic movement - random direction changes
            if (Math.random() < 0.03) {
                e.vx = (Math.random() > 0.5 ? 1 : -1) * e.speed;
                e.direction = e.vx > 0 ? 1 : -1;
            }
            // Jump randomly
            if (e.onGround && Math.random() < 0.02) {
                e.vy = -10;
                e.onGround = false;
            }
        } else if (e.type === 'influencer') {
            // Follow player to invert controls
            const dx = player.x - e.x;
            if (Math.abs(dx) < 200 && Math.abs(dx) > 50) {
                e.vx = dx > 0 ? e.speed : -e.speed;
                e.direction = e.vx > 0 ? 1 : -1;
            }
        } else if (e.type === 'presupuestoAgotado') {
            // Steal points on contact
            if (player.invincible === 0 &&
                player.x < e.x + e.w && player.x + player.width > e.x &&
                player.y < e.y + e.h && player.y + player.height > e.y) {
                const stolen = Math.min(100, score);
                score -= stolen;
                createFloatingText(player.x, player.y - 30, '¡-' + stolen + ' puntos! 💸', '#e94560');
            }
        } else if (e.type === 'deadline') {
            // Countdown and explode
            e.deadlineTimer--;
            if (e.deadlineTimer <= 0) {
                e.deadlineTimer = 300;
                // Explosion
                playSound('hurt');
                createParticles(e.x + e.w/2, e.y + e.h/2, '#ff0000', 15);
                if (Math.abs(player.x - e.x) < 150) {
                    battery -= 20;
                    createFloatingText(player.x, player.y - 30, '¡EXPLOSIÓN! -20% 🔋', '#ff0000');
                }
            }
        } else if (e.type === 'marketing') {
            // Show distracting KPI text
            e.marketingTimer++;
            if (e.marketingTimer % 120 === 0) {
                const kpis = ['¡CTR 0.01%!', '¡CPM 500€!', '¡ROI negativo!', '¡Bounce 99%!', '¡Engagement 0!'];
                e.marketingText = kpis[Math.floor(Math.random() * kpis.length)];
            }
        }
        
        // Guionista shoots script pages
        if (e.type === 'guionista' && frameCount % 90 === 0) {
            const dx = player.x - e.x;
            const dy = player.y - e.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 300) {
                e.scriptProjectiles.push({
                    x: e.x + e.w/2,
                    y: e.y + e.h/2,
                    vx: (dx / dist) * 4,
                    vy: (dy / dist) * 4,
                    life: 90
                });
            }
        }
        
        // Update script projectiles
        if (e.scriptProjectiles) {
            e.scriptProjectiles = e.scriptProjectiles.filter(sp => {
                sp.x += sp.vx;
                sp.y += sp.vy;
                sp.life--;
                
                // Check collision with player
                if (player.invincible === 0 &&
                    sp.x > player.x && sp.x < player.x + player.width &&
                    sp.y > player.y && sp.y < player.y + player.height) {
                    battery -= 10;
                    player.invincible = 30;
                    playSound('hurt');
                    createFloatingText(player.x, player.y - 30, '¡Página de guion! -10% 🔋', '#e94560');
                    return false;
                }
                
                return sp.life > 0;
            });
        }
        
        // Find the platform this enemy is on
        let currentPlat = null;
        for (const plat of platforms) {
            if (plat.type === 'block' || plat.type === 'pipe') continue;
            // Check if enemy is standing on this platform
            const footX = e.x + e.w/2;
            const footY = e.y + e.h;
            if (footX >= plat.x && footX <= plat.x + plat.w &&
                footY >= plat.y - 2 && footY <= plat.y + plat.h + 2) {
                currentPlat = plat;
                break;
            }
        }
        
        if (currentPlat) {
            // Move horizontally
            e.x += e.vx;
            
            // Check if we should turn around (edge of platform or range exceeded)
            const centerX = e.x + e.w/2;
            const wouldExceedRange = centerX > e.startX + e.range || centerX < e.startX - e.range;
            
            // Check if there's platform ahead
            const aheadX = e.vx > 0 ? e.x + e.w + 5 : e.x - 5;
            const groundAhead = platforms.some(plat => {
                if (plat.type === 'block' || plat.type === 'pipe') return false;
                return aheadX >= plat.x && aheadX <= plat.x + plat.w &&
                       Math.abs(plat.y - currentPlat.y) < 5; // Same height platform
            });
            
            if (wouldExceedRange || !groundAhead) {
                e.vx *= -1;
                e.direction *= -1;
            }
            
            // Keep enemy on platform surface
            e.y = currentPlat.y - e.h;
        } else {
            // Enemy not on platform - apply simple gravity to find one
            e.y += 3;
            // If fell too far, respawn at start position
            if (e.y > canvas.height + 100) {
                e.x = e.startX;
                e.y = 100; // Start high and let gravity find platform
                e.vx = e.speed * e.direction;
            }
        }
        
        e.animTimer = (e.animTimer || 0) + 1;
        if (e.animTimer > 8) {
            e.animTimer = 0;
            e.animFrame = (e.animFrame || 0) + 1;
        }
        
        // Collision with player
        if (player.invincible === 0 && activePowerup !== 'powerup4K' &&
            player.x < e.x + e.w && player.x + player.width > e.x &&
            player.y < e.y + e.h && player.y + player.height > e.y) {
            battery -= 15;
            player.vy = -10;
            player.vx = player.x < e.x ? -8 : 8;
            player.invincible = 60;
            player.state = 'hurt';
            playSound('hurt');
            createParticles(player.x + 16, player.y + 20, '#e94560', 8);
            createFloatingText(player.x, player.y - 30, '¡Ouch! -15% 🔋', '#e94560');
        }
    }

    // Boss physics
    if (boss) {
        applyGravity(boss);
        boss.x += boss.vx;
        if (boss.x > boss.startX + 200 || boss.x < boss.startX - 200) boss.vx *= -1;
        boss.y += boss.vy;
        checkPlatformCollision(boss);
        if (boss.y > canvas.height + 200) { boss.y = 300; boss.vy = 0; }
        if (player.invincible === 0 && activePowerup !== 'powerup4K' &&
            player.x < boss.x + boss.w/2 && player.x + player.width > boss.x - boss.w/2 &&
            player.y < boss.y + boss.h/2 && player.y + player.height > boss.y - boss.h/2) {
            battery -= 25;
            player.vy = -12;
            player.vx = player.x < boss.x ? -10 : 10;
            player.invincible = 90;
            player.state = 'hurt';
            playSound('hurt');
            createParticles(player.x + 16, player.y + 20, '#ff0000', 12);
            createFloatingText(player.x, player.y - 40, '¡BOSS! -25% 🔋', '#ff0000');
        }
    }

    if (frameCount % 120 === 0) battery -= 0.3;
    if (battery <= 0) {
        showMessage('¡Batería agotada! 🔋', 'Tu cámara se ha quedado sin pila...', 'Reintentar', startGame);
    }

    if (level < 3 && player.x > WORLD_WIDTH - 200) {
        level++;
        loadLevel(level);
        createFloatingText(canvas.width/2, canvas.height/2, '¡Nivel ' + level + '! 🎬', '#4ecca3');
    } else if (level === 3 && !boss && !victoryState && player.x > WORLD_WIDTH - 200) {
        victoryState = { timer: 0, cameraY: camera.y };
        playSound('victory');
    }

    particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.2;
        p.life--;
        return p.life > 0;
    });

    floatingTexts = floatingTexts.filter(t => {
        t.y += t.vy; t.life--;
        return t.life > 0;
    });

    updateHUD();
}

function updateHUD() {
    document.getElementById('scoreValue').textContent = score;
    document.getElementById('levelValue').textContent = level;
    const progress = (player.x / WORLD_WIDTH) * 100;
    document.getElementById('progressFill').style.width = progress + '%';
    const fill = document.getElementById('batteryFill');
    fill.style.width = battery + '%';
    fill.className = 'battery-fill';
    if (battery < 30) fill.classList.add('critical');
    else if (battery < 50) fill.classList.add('low');
}

        function showVictoryScreen() {
            gameRunning = false;
            
            // Victory music (MIDI-style arpeggio)
            if (audioCtx) {
                const notes = [523, 659, 784, 1047, 784, 1047, 1319, 1047, 784, 659, 523];
                const durations = [0.2, 0.2, 0.2, 0.4, 0.2, 0.2, 0.4, 0.2, 0.2, 0.2, 0.6];
                let time = audioCtx.currentTime;
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(freq, time);
                    gain.gain.setValueAtTime(0.25, time);
                    gain.gain.exponentialRampToValueAtTime(0.01, time + durations[i]);
                    osc.start(time);
                    osc.stop(time + durations[i]);
                    time += durations[i];
                });
                // Bass line
                const bassNotes = [262, 262, 330, 392, 392, 330, 262];
                let bassTime = audioCtx.currentTime;
                bassNotes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, bassTime);
                    gain.gain.setValueAtTime(0.3, bassTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, bassTime + 0.4);
                    osc.start(bassTime);
                    osc.stop(bassTime + 0.4);
                    bassTime += 0.4;
                });
            }
            
            // Draw victory scene
            let victoryFrame = 0;

                    ctx.fillRect(sx, sy, 2, 2);

                ctx.globalAlpha = 1;
                
                // Confetti
                for (let i = 0; i < 50; i++) {

                    const cy = ((i * 37 + victoryFrame * 3) % (canvas.height + 50)) - 50;
                    const colors = ['#e94560', '#ffd700', '#4ecca3', '#0d47a1', '#ff5722'];
                    ctx.fillStyle = colors[i % colors.length];
                    ctx.fillRect(cx, cy, 6, 6);
                }
                
                // Player jumping with camera raised
                const playerY = canvas.height/2 + 50 - Math.abs(Math.sin(victoryFrame * 0.08)) * 80;
                const jumpAngle = Math.sin(victoryFrame * 0.08) * 0.3;
                
                ctx.save();
                ctx.translate(canvas.width/2 - 50, playerY);
                ctx.rotate(jumpAngle);
                
                // Body
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(-8, -5, 16, 20);
                // Head
                ctx.fillStyle = '#fdbcb4';
                ctx.beginPath();
                ctx.arc(0, -12, 10, 0, Math.PI * 2);
                ctx.fill();
                // Happy eyes
                ctx.fillStyle = '#333';
                ctx.fillRect(-5, -16, 4, 4);
                ctx.fillRect(2, -16, 4, 4);
                // Smile
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(0, -10, 4, 0.2, Math.PI - 0.2);
                ctx.stroke();
                // Red cap
                ctx.fillStyle = '#e94560';
                ctx.fillRect(-10, -22, 20, 6);
                // Arm raised with camera
                ctx.fillStyle = '#fdbcb4';
                ctx.fillRect(8, -15, 4, 12);
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(6, -25, 14, 10);
                ctx.fillStyle = '#0d47a1';
                ctx.beginPath();
                ctx.arc(13, -20, 4, 0, Math.PI * 2);
                ctx.fill();
                // Flash effect
                if (victoryFrame % 20 < 5) {
                    ctx.fillStyle = 'rgba(255,215,0,0.5)';
                    ctx.beginPath();
                    ctx.arc(13, -20, 20, 0, Math.PI * 2);
                    ctx.fill();
                }
                // Legs
                ctx.fillStyle = '#34495e';
                ctx.fillRect(-6, 12, 5, 12);
                ctx.fillRect(1, 12, 5, 12);
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(-8, 22, 8, 5);
                ctx.fillRect(1, 22, 8, 5);
                
                ctx.restore();
                
                // Trophy
                ctx.font = '80px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🏆', canvas.width/2 + 80, canvas.height/2 + 20);
                
                // Title
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('¡ENHORABUENA!', canvas.width/2, 80);
                
                ctx.fillStyle = '#fff';
                ctx.font = '22px Arial';
                ctx.fillText('Has completado la producción', canvas.width/2, 120);
                ctx.fillText(`Puntuación final: ${score}`, canvas.width/2, 155);
                
                // Sponsor
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(canvas.width/2 - 180, canvas.height - 120, 360, 70);
                ctx.strokeStyle = '#e94560';
                ctx.lineWidth = 2;
                ctx.strokeRect(canvas.width/2 - 180, canvas.height - 120, 360, 70);
                
                ctx.fillStyle = '#fff';
                ctx.font = '14px Arial';
                ctx.fillText('Juego patrocinado por', canvas.width/2, canvas.height - 95);
                ctx.fillStyle = '#4ecca3';
                ctx.font = 'bold 18px Arial';
                ctx.fillText('iaparafilmmakers.es', canvas.width/2, canvas.height - 70);
                
                // Play again button
                const btnY = canvas.height/2 + 140;
                ctx.fillStyle = '#e94560';
                ctx.fillRect(canvas.width/2 - 80, btnY, 160, 45);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(canvas.width/2 - 80, btnY, 160, 45);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px Arial';
                ctx.fillText('Jugar de nuevo', canvas.width/2, btnY + 28);
                
                // Click handler for play again
                canvas.onclick = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const mx = e.clientX - rect.left;
                    const my = e.clientY - rect.top;
                    if (mx > canvas.width/2 - 80 && mx < canvas.width/2 + 80 &&
                        my > btnY && my < btnY + 45) {
                        clearInterval(victoryInterval);
                        canvas.onclick = null;
                        startGame();
                    }
                };
                
                // Also handle touch
                canvas.ontouchend = (e) => {
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const touch = e.changedTouches[0];
                    const mx = touch.clientX - rect.left;
                    const my = touch.clientY - rect.top;
                    if (mx > canvas.width/2 - 80 && mx < canvas.width/2 + 80 &&
                        my > btnY && my < btnY + 45) {
                        clearInterval(victoryInterval);
                        canvas.ontouchend = null;
                        startGame();
                    }
                };
                
            }, 16);
        }


function draw() {
    ctx.fillStyle = currentLevel ? '#16213e' : '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    for (let i = 0; i < 50; i++) {
        ctx.fillRect((i * 73 + frameCount * 0.1) % canvas.width, (i * 37) % canvas.height, 2, 2);
    }

    ctx.save();
    ctx.translate(-camera.x, victoryState ? -victoryState.cameraY : 0);

    // Platforms
    for (const plat of platforms) {
        if (plat.type === 'block') {
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
            ctx.fillStyle = '#D2691E';
            ctx.fillRect(plat.x + 2, plat.y + 2, plat.w - 4, plat.h - 4);
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(plat.x + 6, plat.y + 6, plat.w - 12, plat.h - 12);
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(plat.x + 8, plat.y + 8, plat.w - 16, plat.h - 16);
            // Brick pattern
            ctx.fillStyle = '#8B4513';
            for (let by = 0; by < plat.h; by += 10) {
                const offset = (by / 10 % 2) * 10;
                for (let bx = offset; bx < plat.w; bx += 20) {
                    ctx.fillRect(plat.x + bx, plat.y + by, 18, 1);
                }
            }
        } else if (plat.type === 'pipe') {
            ctx.fillStyle = '#228B22';
            ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
            ctx.fillStyle = '#32CD32';
            ctx.fillRect(plat.x + 4, plat.y + 4, plat.w - 8, plat.h - 8);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(plat.x - 5, plat.y, plat.w + 10, 20);
            ctx.fillStyle = '#32CD32';
            ctx.fillRect(plat.x - 1, plat.y + 2, plat.w + 2, 16);
            ctx.fillStyle = '#1a6b1a';
            ctx.fillRect(plat.x - 5, plat.y + 18, plat.w + 10, 4);
        } else {
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
            ctx.fillStyle = '#e94560';
            ctx.fillRect(plat.x, plat.y, plat.w, 4);
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            for (let i = 0; i < plat.w; i += 20) {
                ctx.fillRect(plat.x + i, plat.y + 10, 1, plat.h - 15);
            }
        }
    }

    // Powerups
    for (const p of powerups) {
        if (!p.collected) {
            const y = p.y + p.floatY;
            const pulse = Math.sin(frameCount * 0.1) * 3;
            
            // Glow effect
            ctx.fillStyle = p.type === 'powerupTriple' ? 'rgba(233, 69, 96, 0.3)' : 
                           p.type === 'powerupNuke' ? 'rgba(255, 87, 34, 0.3)' : 
                           'rgba(33, 150, 243, 0.3)';
            ctx.beginPath();
            ctx.arc(p.x + 15, y + 15, 25 + pulse, 0, Math.PI * 2);
            ctx.fill();
            
            // Outer ring
            ctx.strokeStyle = p.type === 'powerupTriple' ? '#e94560' : 
                              p.type === 'powerupNuke' ? '#ff5722' : '#2196f3';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(p.x + 15, y + 15, 20, 0, Math.PI * 2);
            ctx.stroke();
            
            // Inner circle
            ctx.fillStyle = p.type === 'powerupTriple' ? '#e94560' : 
                           p.type === 'powerupNuke' ? '#ff5722' : '#2196f3';
            ctx.beginPath();
            ctx.arc(p.x + 15, y + 15, 15, 0, Math.PI * 2);
            ctx.fill();
            
            // Icon
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(getEmoji(p.type), p.x + 15, y + 22);
            
            // Label
            const label = itemLabels[p.type];
            if (label) {
                ctx.font = 'bold 10px Arial';
                const textWidth = ctx.measureText(label.name).width;
                const padding = 4;
                const boxWidth = textWidth + padding * 2;
                const boxHeight = 16;
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(p.x + 15 - boxWidth/2, y - 30, boxWidth, boxHeight);
                ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1;
                ctx.strokeRect(p.x + 15 - boxWidth/2, y - 30, boxWidth, boxHeight);
                ctx.fillStyle = '#ffd700';
                ctx.textAlign = 'center';
                ctx.fillText(label.name, p.x + 15, y - 19);
            }
        }
    }

    // Flash bombs
    for (const b of flashBombs) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
        ctx.fill();
        // Spark trail
        ctx.fillStyle = 'rgba(255, 215, 0, 0.5)';
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.arc(b.x - b.vx * i * 2, b.y - b.vy * i * 2, 3 - i, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Collectibles with always-visible labels
    for (const c of collectibles) {
        if (!c.collected) {
            const y = c.y + c.floatY;
            drawSpriteItem(c.x + 15, y + 15, c.type, 30);
            const label = itemLabels[c.type];
            if (label) {
                ctx.font = 'bold 10px Arial';
                const textWidth = ctx.measureText(label.name).width;
                const padding = 4;
                const boxWidth = textWidth + padding * 2;
                const boxHeight = 16;
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(c.x + 15 - boxWidth/2, y - 25, boxWidth, boxHeight);
                ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1;
                ctx.strokeRect(c.x + 15 - boxWidth/2, y - 25, boxWidth, boxHeight);
                ctx.fillStyle = '#ffd700';
                ctx.textAlign = 'center';
                ctx.fillText(label.name, c.x + 15, y - 14);
            }
        }
    }

    // Enemies with labels
    for (const e of enemies) {
        const facing = e.vx > 0 ? 1 : -1;
        const centerX = e.x + e.w/2;
        const centerY = e.y + e.h/2;
        switch(e.type) {
            case 'clientePesado':
                drawSpriteEnemyClientePesado(centerX, centerY, 30, facing, e.animFrame);
                break;
            case 'cambioInesperado':
                drawSpriteEnemyCambioInesperado(centerX, centerY, 30, facing, e.animFrame);
                break;
            case 'hacienda':
                drawSpriteEnemyHacienda(centerX, centerY, 30, facing, e.animFrame);
                break;
            case 'guionista':
                drawSpriteEnemyGuionista(centerX, centerY, 30, facing, e.animFrame);
                break;
            case 'actorDivo':
                drawSpriteEnemyActorDivo(centerX, centerY, 28, facing, e.animFrame);
                break;
            case 'presupuestoAgotado':
                drawSpriteEnemyPresupuesto(centerX, centerY, 26, facing, e.animFrame);
                break;
            case 'deadline':
                drawSpriteEnemyDeadline(centerX, centerY, 26, facing, e.animFrame, e.deadlineTimer);
                break;
            case 'influencer':
                drawSpriteEnemyInfluencer(centerX, centerY, 26, facing, e.animFrame);
                break;
            case 'marketing':
                drawSpriteEnemyMarketing(centerX, centerY, 28, facing, e.animFrame, e.marketingText);
                break;
        }
        drawEnemyLabel(centerX, e.y - 10, enemyLabels[e.type]);
        
        // Draw marketing KPI text
        if (e.type === 'marketing' && e.marketingText) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(centerX - 50, e.y - 50, 100, 18);
            ctx.fillStyle = '#ff9800';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(e.marketingText, centerX, e.y - 38);
        }
        
        // Draw deadline countdown
        if (e.type === 'deadline') {
            const seconds = Math.ceil(e.deadlineTimer / 60);
            ctx.fillStyle = seconds < 3 ? '#ff0000' : '#ff9800';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(seconds + '', centerX, e.y - 25);
        }
        
        // Draw script projectiles
        if (e.scriptProjectiles) {
            for (const sp of e.scriptProjectiles) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(sp.x - 4, sp.y - 6, 8, 12);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.strokeRect(sp.x - 4, sp.y - 6, 8, 12);
                ctx.fillStyle = '#333';
                ctx.font = '8px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PÁG', sp.x, sp.y);
            }
        }
        if (e.currentHealth < e.health) {
            ctx.fillStyle = '#333';
            ctx.fillRect(e.x, e.y - 25, e.w, 4);
            ctx.fillStyle = '#e94560';
            ctx.fillRect(e.x, e.y - 25, e.w * (e.currentHealth / e.health), 4);
        }
    }

    // Boss
    if (boss) {
        drawSpriteEnemyProductor(boss.x, boss.y, 60, boss.currentHealth, frameCount);
        drawEnemyLabel(boss.x, boss.y - boss.h/2 - 15, enemyLabels['productor']);
    }

    // Active powerup indicator
    if (activePowerup) {
        const timeLeft = Math.ceil(powerupTimer / 60);
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(10, 70, 140, 30);
        ctx.strokeStyle = activePowerup === 'powerupTriple' ? '#e94560' : 
                          activePowerup === 'powerupNuke' ? '#ff5722' : '#2196f3';
        ctx.lineWidth = 2;
        ctx.strokeRect(10, 70, 140, 30);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'left';
        const name = activePowerup === 'powerupTriple' ? '🎥 TRIPLE' : 
                     activePowerup === 'powerupNuke' ? '💣 NUCLEAR' : '⚡ 4K';
        ctx.fillText(name + ' ' + timeLeft + 's', 18, 90);
    }

    // Control inverted warning
    if (controlInverted) {
        ctx.fillStyle = 'rgba(156, 39, 176, 0.7)';
        ctx.fillRect(canvas.width/2 - 80, 100, 160, 30);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('📱 ¡CONTROLES INVERTIDOS!', canvas.width/2, 120);
    }

    // Projectiles
    for (const p of projectiles) {
        ctx.fillStyle = '#ffd700';
        ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
        ctx.beginPath(); ctx.arc(p.x, p.y, 15, 0, Math.PI * 2); ctx.fill();
    }

    // Player
    drawAnimatedPlayer();

    // Particles
    for (const p of particles) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 30;
        ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // Floating texts
    for (const t of floatingTexts) {
        ctx.fillStyle = t.color;
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.globalAlpha = t.life / 60;
        ctx.fillText(t.text, t.x, t.y);
    }
    ctx.globalAlpha = 1;

    ctx.restore();

    // Level name
    if (currentLevel && frameCount < 180 && !victoryState) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(currentLevel.name, canvas.width/2, canvas.height/2 - 20);
        ctx.fillStyle = '#fff';
        ctx.font = '20px Arial';
        ctx.fillText('¡Usa tu cámara contra los enemigos!', canvas.width/2, canvas.height/2 + 20);
    }

    // Victory overlay
    if (victoryState) {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 50px Arial';
        ctx.textAlign = 'center';
        const bounce = Math.sin(victoryState.timer * 0.1) * 10;
        ctx.fillText('¡VICTORIA!', canvas.width/2, canvas.height/3 + bounce);
        ctx.fillStyle = '#fff';
        ctx.font = '24px Arial';
        ctx.fillText('¡El Productor ha caído!', canvas.width/2, canvas.height/3 + 50);
    }
}

function drawSpriteItem(x, y, type, size) {
    switch(type) {
        case 'camera': drawSpriteCamera(x, y, size); break;
        case 'lens': drawSpriteLens(x, y, size); break;
        case 'battery': drawSpriteBattery(x, y, size); break;
        case 'coffee': drawSpriteCoffee(x, y, size); break;
        case 'clapper': drawSpriteClapper(x, y, size); break;
        case 'drone': drawSpriteDrone(x, y, size); break;
        default:
            ctx.font = size + 'px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(getEmoji(type), x, y + size/3);
    }
}

    const emojis = {
        camera: '📷', lens: '🔭', sd: '💾', battery: '🔋', drone: '🚁',
        gimbal: '🎥', mic: '🎤', light: '💡', tripod: '📐', clapper: '🎬',

        color: '🌈', vfx: '✨', premiere: '🎞️',
